server.port=8082

spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=accountsdb
spring.webflux.base-path=/api/v1
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.data.redis.host=redis
spring.data.redis.port=6379
redis.cache.ttl-seconds=900

accounts.number.prefix=ACC-
accounts.number.width=8
accounts.rules.saving.max-movements.personal=10
accounts.rules.saving.max-movements.vip=15
accounts.rules.current.maintenance-fee.personal=5.0
accounts.rules.current.maintenance-fee.enterprise=15.0
accounts.rules.default.free-transaction-limit=10
accounts.rules.default.transaction-fee=1.0
accounts.rules.fixed-term.default-specific-day=1
accounts.rules.vip.default-minimum-daily-average=1.0
