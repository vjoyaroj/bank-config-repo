server.port=8084

spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=transactiondb
spring.mongodb.uri=mongodb://mongodb:27017/transactiondb?retryWrites=false
spring.data.mongodb.uri=mongodb://mongodb:27017/transactiondb?retryWrites=false
spring.webflux.base-path=/api/v1
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.data.redis.host=redis
spring.data.redis.port=6379
redis.cache.ttl-seconds=900

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=transactions-yanki-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
yanki.kafka.topics.wallet=bank.yanki.wallet.v1
yanki.kafka.topics.payment=bank.yanki.payment.v1
