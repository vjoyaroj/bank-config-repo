server.port=8086

spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=yankidb
spring.mongodb.uri=mongodb://mongodb:27017/yankidb?retryWrites=false
spring.data.mongodb.uri=mongodb://mongodb:27017/yankidb?retryWrites=false
spring.webflux.base-path=/api/v1
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.data.redis.host=redis
spring.data.redis.port=6379
redis.cache.ttl-seconds=900

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
yanki.kafka.topics.wallet=bank.yanki.wallet.v1
yanki.kafka.topics.payment=bank.yanki.payment.v1
yanki.outbox.publisher.batch-size=100
yanki.outbox.publisher.delay-ms=5000
